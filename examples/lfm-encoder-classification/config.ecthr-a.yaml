model:
  id: LiquidAI/LFM2.5-Encoder-350M

dataset:
  source:
    type: huggingface
    id: coastalcph/lex_glue
    name: ecthr_a
  text_column: text
  labels_column: labels
  labels:
    - "2"
    - "3"
    - "5"
    - "6"
    - "8"
    - "9"
    - "10"
    - "11"
    - "14"
    - P1-1

training:
  output_dir: local/ecthr-a-classifier
  max_length: 8192
  epochs: 3
  learning_rate: 3.0e-5
  weight_decay: 0.0
  warmup_ratio: 0.1
  train_batch_size: 1
  eval_batch_size: 1
  gradient_accumulation_steps: 8
  gradient_checkpointing: true
  precision: bf16
  seed: 42
