name: TelcoTriage
options:
  bundleIdPrefix: ai.liquid.demos
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

# This cookbook example vendors the shared LFMEngine source files directly
# into the app target instead of linking a local Swift package product. That
# keeps the example self-contained and avoids Xcode package-product resolution
# failures when the folder is copied out of a larger workspace.
#
# LeapSDK is Liquid's edge runtime. The optional audio pack uses it for
# audio-token inference, while the text pipeline keeps using llama.swift
# for local LoRA adapter loading and hot-swap.
packages:
  llama.swift:
    url: https://github.com/mattt/llama.swift.git
    exactVersion: "2.8851.0"
  mlx-swift-lm:
    url: https://github.com/ml-explore/mlx-swift-lm.git
    exactVersion: "2.30.6"
  LeapSDK:
    url: https://github.com/Liquid4All/leap-ios.git
    from: "0.9.4"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "21"
    CODE_SIGN_STYLE: Automatic
    # LeapSDK's simulator dylibs are built with an iOS 18.5 simulator
    # deployment target. Keep physical devices on iOS 17.0, but avoid
    # simulator linker mismatches in Xcode by raising only simulator builds.
    "IPHONEOS_DEPLOYMENT_TARGET[sdk=iphonesimulator*]": "18.5"

targets:
  TelcoTriage:
    type: application
    platform: iOS
    sources:
      # Ship the current Telco Triage runtime pack after running
      # bootstrap-models.sh:
      # - LFM2.5-350M base
      # - telco-shared-clf-v1 support-understanding adapter
      # - telco-turn-relation-v4 stateful follow-up classifier
      # - telco-tool-selector-v3 action helper for ambiguous tool args
      # - telco-dialogue-repair-v4 bounded repair verbalizer
      #
      # Large GGUFs stay out of git. The customer path is relation +
      # shared heads + BM25 RAG + deterministic composer; legacy Stage B,
      # ColBERT, and old router adapters are not part of the normal bundle.
      - path: TelcoTriage
      - path: Packages/LFMEngine/Sources/LFMEngine
        name: LFMEngine
        group: SharedPackages
        createIntermediateGroups: false
    dependencies:
      - package: llama.swift
        product: LlamaSwift
      - package: mlx-swift-lm
        product: MLXVLM
      - package: mlx-swift-lm
        product: MLXLMCommon
      - package: LeapSDK
        product: LeapSDK
    info:
      path: TelcoTriage/Info.plist
      properties:
        CFBundleIconName: AppIcon
        CFBundleDisplayName: Telco Triage
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSMicrophoneUsageDescription: "Telco Triage uses your microphone for on-device voice support; your audio never leaves the phone in Phase 1."
        NSSpeechRecognitionUsageDescription: "Voice queries are transcribed on-device and answered from the local knowledge base."
        NSCameraUsageDescription: "Take a photo of your router lights or bill and Telco Triage analyzes it on-device."
        NSPhotoLibraryUsageDescription: "Pick a photo of your router, bill, or error screen for on-device analysis."
        UILaunchScreen: {}
        UIStatusBarStyle: UIStatusBarStyleDefault
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.liquid.demos.telcotriage
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) LLAMA_CPP_AVAILABLE"

  TelcoTriageTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      # Customer-facing cookbook tests: keep the suite focused on the
      # architecture that actually ships in this example. The source app
      # still contains some disabled research scaffolding for historical
      # comparison, but the cookbook validation contract is one shared
      # LFM understanding pass + BM25 hierarchy RAG + policy/composer +
      # bounded dialogue-repair verbalization.
      - TelcoTriageTests/AnswerComposerTests.swift
      - TelcoTriageTests/BM25HierarchyRetrieverSwiftParityTests.swift
      - TelcoTriageTests/ChatViewModelIntegrationTests.swift
      - TelcoTriageTests/ConversationRecoveryTests.swift
      - TelcoTriageTests/ConversationStateTests.swift
      - TelcoTriageTests/MultiTurnHeuristicsTests.swift
      - TelcoTriageTests/MultiTurnIntegrationTests.swift
      - TelcoTriageTests/MultiTurnRetrievalAugmentationTests.swift
      - TelcoTriageTests/PhoneFlowValidationTests.swift
      - TelcoTriageTests/TelcoDialogueBlackboardTests.swift
      - TelcoTriageTests/TelcoPolicyEngineTests.swift
      - TelcoTriageTests/TelcoStateOperationResolverTests.swift
      - TelcoTriageTests/ToolExecutorTests.swift
      - TelcoTriageTests/VerizonDispatcherComposerPathTests.swift
      - TelcoTriageTests/Fixtures/ScriptedBackend.swift
      - TelcoTriageTests/Fixtures/TestChatHarness.swift
      - TelcoTriageTests/Fixtures/retriever_parity_v1.json
    dependencies:
      - target: TelcoTriage
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/TelcoTriage.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/TelcoTriage"
        GENERATE_INFOPLIST_FILE: "YES"

schemes:
  TelcoTriage:
    build:
      targets:
        TelcoTriage: all
        TelcoTriageTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - TelcoTriageTests
